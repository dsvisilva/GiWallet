<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MinhasFinanças</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <div class="logo">💰 MinhasFinanças</div>
  <button onclick="toggleTheme()">🌙</button>
</div>

<div class="main">
  <h2>Adicionar Transação</h2>

  <input id="tx-desc" placeholder="Descrição">
  <input id="tx-amount" type="number" placeholder="Valor">
  
  <select id="tx-cat">
    <option value="salario">Salário</option>
    <option value="alimentacao">Alimentação</option>
  </select>

  <input id="tx-date" type="date">

  <button onclick="saveTransaction()">Salvar</button>

  <h2>Resumo</h2>
  <div id="summaryCards"></div>

  <h2>Transações</h2>
  <ul id="allTxList"></ul>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="script.js"></script>
</body>
</html>
